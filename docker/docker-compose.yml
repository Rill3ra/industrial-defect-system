version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: industrial-api
    ports:
      - "8000:8000"
    volumes:
      - ../runs:/app/runs
      - ../data:/app/data          # ← монтируем всю data
      - ~/.cache/torch:/root/.cache/torch
    environment:
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    container_name: industrial-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ../runs:/app/runs
      - ../data:/app/data          # ← монтируем всю data
      - ~/.cache/torch:/root/.cache/torch
    environment:
      - PYTHONPATH=/app
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
